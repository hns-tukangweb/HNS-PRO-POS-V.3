<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HNS PRO POS</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/9/98/Kota_Bengkulu.png" />
  <!-- SweetAlert2 untuk Notifikasi di Tingkat Wrapper -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll ganda */
    }

    .iframe-container {
      width: 100%;
      height: 100dvh; /* Menggunakan dvh agar pas di mobile browser */
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Area cetak wrapper khusus untuk menangkap render struk kasir tanpa popup blocker */
    #wrapperPrintArea {
      display: none;
    }

    /* ✨ [FIX: SINKRONISASI MEDIA CETAK ATAS] */
    @media print {
      body {
        background-color: #ffffff !important;
        color: #000000 !important;
      }
      .iframe-container {
        display: none !important;
      }
      #wrapperPrintArea {
        display: block !important;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        margin: 0;
        padding: 0;
        background: #ffffff !important;
      }
      #wrapperPrintArea * {
        color: #000000 !important;
      }
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <!-- 
      ✨ [UPDATE: Menambahkan deklarasi perizinan komprehensif pada atribut allow] 
      Sangat penting agar Google Chrome mengizinkan Web Bluetooth API, USB, dan Kamera berjalan di wrapper terluar.
    -->
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbyRUuCzBOvG2kwGLStWK79w9WwgI-Uk7vZaKpPEex6SPmh1KdhiC3eU7ic3TUnUvnq9Bw/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation; bluetooth; usb; serial;">
    </iframe>
  </div>

  <!-- Area render cetak aman di tingkat atas peramban -->
  <div id="wrapperPrintArea"></div>

  <!-- ✨ [UPDATE: Penambahan Jembatan Cetak & Bluetooth (Iframe PostMessage Bridge)] -->
  <script>
    let bluetoothCharacteristic = null;
    let bluetoothDevice = null;

    // Mendengarkan pesan cetak dan bluetooth yang dikirim oleh Iframe Kasir Hns Pro POS
    window.addEventListener('message', async function(event) {
      if (!event.data || typeof event.data !== 'object') return;
      
      const request = event.data;

      // 1. Aksi Hubungkan Bluetooth Thermal di Jendela Atas (Top-Level)
      if (request.type === 'CONNECT_BT_PRINTER') {
        try {
          if (!navigator.bluetooth) {
            Swal.fire("Sistem Tidak Didukung", "Browser Anda tidak mendukung Web Bluetooth. Gunakan Chrome di Android / HTTPS.", "warning");
            return;
          }
          
          bluetoothDevice = await navigator.bluetooth.requestDevice({
            filters: [
              { services: ['000018f0-0000-1000-8000-00805f9b34fb'] },
              { namePrefix: 'MPT' },
              { namePrefix: 'RT' },
              { namePrefix: 'Thermal' }
            ],
            optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
          });

          const server = await bluetoothDevice.gatt.connect();
          const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
          const characteristics = await service.getCharacteristics();
          bluetoothCharacteristic = characteristics[0];

          // Kirim balik status sukses ke Iframe kasir
          document.getElementById('app').contentWindow.postMessage({
            type: 'BT_CONNECTED',
            deviceName: bluetoothDevice.name
          }, '*');

          Swal.fire("Koneksi Sukses", `Terhubung ke printer bluetooth: ${bluetoothDevice.name}`, "success");
        } catch (err) {
          Swal.fire("Gagal Hubungkan", err.message, "error");
        }
      }

      // 2. Aksi Silent Print via Bluetooth Thermal ESC/POS (58mm)
      if (request.type === 'PRINT_BT_ESC') {
        if (!bluetoothCharacteristic) {
          Swal.fire("Printer Offline", "Sambungkan printer bluetooth thermal terlebih dahulu.", "warning");
          return;
        }
        try {
          const encoder = new TextEncoder();
          const commands = request.commands;
          const uint8Array = new Uint8Array(commands.flatMap(item => typeof item === 'string' ? Array.from(encoder.encode(item)) : item));
          
          // Kirim chunk data berukuran 20 bytes ke printer thermal
          const chunkSize = 20;
          for (let i = 0; i < uint8Array.length; i += chunkSize) {
            const chunk = uint8Array.slice(i, i + chunkSize);
            await bluetoothCharacteristic.writeValue(chunk);
          }
        } catch (printErr) {
          Swal.fire("Gagal Kirim Struk", printErr.message, "error");
        }
      }

      // 3. Aksi Chrome Print Tanpa Stuck (Browser Dialog)
      // ✨ [FIX: BYPASS BROWSER POPUP BLOCKER DI MOBILE CHROME]
      if (request.type === 'EXECUTE_BROWSER_PRINT') {
        try {
          const printArea = document.getElementById('wrapperPrintArea');
          const iframeCon = document.querySelector('.iframe-container');
          
          // Tulis konten struk langsung ke div tingkat atas
          printArea.innerHTML = request.htmlContent;
          printArea.style.display = 'block';
          iframeCon.style.display = 'none';
          
          // Berikan jeda kecil untuk penyesuaian render DOM, lalu cetak secara native
          setTimeout(() => {
            window.print();
            // Kembalikan ke tampilan dasbor kasir semula setelah mencetak
            iframeCon.style.display = 'block';
            printArea.style.display = 'none';
            printArea.innerHTML = '';
          }, 150);
        } catch (browserPrintErr) {
          Swal.fire("Gagal Membuka Struk", browserPrintErr.message, "error");
        }
      }
    });
  </script>
</body>
</html>
